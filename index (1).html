<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HabitFlow">
<title>HabitFlow – Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14;--surface:#1a1a24;--s2:#22222f;--s3:#2a2a3a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f8;--muted:#6b6b85;--muted2:#9090a8;
  --accent:#7c6fff;--accent2:#ff6f91;--green:#4ade80;--amber:#fbbf24;--cyan:#22d3ee;
  --r:18px;--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes checkPop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.25) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(12,12,18,0.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 calc(10px + var(--sb));z-index:100;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 22px;border-radius:12px;transition:all 0.22s;border:none;background:none;color:var(--muted);}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:21px;line-height:1;transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1);}
.nav-item.active .nav-icon{transform:scale(1.18);}
.nav-label{font-size:10px;font-weight:500;}

/* PAGES */
.page{display:none;padding:0 0 95px;min-height:100vh;}
.page.active{display:block;}

/* HEADER */
.header{padding:52px 20px 14px;display:flex;align-items:flex-end;justify-content:space-between;}
.h-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;}
.h-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.add-btn{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#5448d4);border:none;color:white;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(124,111,255,0.45);transition:transform 0.15s,box-shadow 0.15s;}
.add-btn:active{transform:scale(0.9);box-shadow:0 2px 8px rgba(124,111,255,0.3);}

/* BANNER */
.today-banner{margin:0 20px 16px;background:linear-gradient(135deg,rgba(124,111,255,0.1),rgba(255,111,145,0.07));border:1px solid rgba(124,111,255,0.16);border-radius:16px;padding:16px;animation:fadeUp 0.4s ease both;}
.banner-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.banner-title{font-size:15px;font-weight:600;}
.banner-pct{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.banner-track{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;}
.banner-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.7s cubic-bezier(0.4,0,0.2,1);}
.banner-sub{font-size:12px;color:var(--muted);margin-top:6px;}

/* HABIT CARDS */
.habits-list{padding:0 20px;display:flex;flex-direction:column;gap:12px;}
.habit-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);position:relative;overflow:hidden;animation:fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) both;transition:transform 0.18s;}
.habit-card:active{transform:scale(0.985);}
.hc-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;}
.hc-body{padding:14px 14px 0 17px;}
.hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.hc-left{display:flex;align-items:center;gap:11px;}
.hc-emoji{font-size:26px;line-height:1;}
.hc-name{font-size:15px;font-weight:600;margin-bottom:3px;}
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.22);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--amber);font-weight:600;animation:bounce 2.5s ease infinite;}
.hc-actions{display:flex;align-items:center;gap:8px;}
.del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;opacity:0.45;transition:opacity 0.2s;}
.del-btn:active{opacity:1;color:var(--accent2);}
.check-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--c,var(--accent));background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);color:var(--c,var(--accent));position:relative;overflow:hidden;flex-shrink:0;}
.check-btn.done{background:var(--c,var(--accent));color:white;border-color:var(--c,var(--accent));}
.check-btn.done .ck-icon{animation:checkPop 0.35s cubic-bezier(0.34,1.56,0.64,1) both;}
.check-btn:active{transform:scale(0.84);}
.week-dots{display:flex;gap:5px;margin-bottom:12px;}
.wd{flex:1;height:5px;border-radius:3px;background:var(--s2);transition:background 0.3s;}
.wd.done{background:var(--c,var(--accent));}
.wd.today{transform:scaleY(1.5);transform-origin:bottom;}

/* TIMER SECTION */
.timer-sec{padding:10px 14px 12px 17px;border-top:1px solid var(--border);}
.timer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.timer-label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;}
.timer-display{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--cyan);letter-spacing:1px;transition:all 0.3s;}
.timer-display.running{animation:pulse 1.4s ease infinite;}
.timer-btns{display:flex;gap:6px;margin-bottom:6px;}
.tbtn{padding:5px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--s2);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;}
.tbtn.go{border-color:rgba(34,211,238,0.3);color:var(--cyan);background:rgba(34,211,238,0.07);}
.tbtn.stop{border-color:rgba(255,111,145,0.3);color:var(--accent2);background:rgba(255,111,145,0.07);}
.tbtn.rst{border-color:var(--border);color:var(--muted);}
.tbtn:active{transform:scale(0.91);}
.timer-logs{display:flex;gap:5px;flex-wrap:wrap;}
.tlog{font-size:11px;color:var(--muted2);background:var(--s2);border-radius:10px;padding:2px 8px;border:1px solid var(--border);}

/* EMPTY */
.empty-state{text-align:center;padding:60px 40px;color:var(--muted);animation:fadeIn 0.5s ease;}
.empty-emoji{font-size:52px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-text{font-size:14px;line-height:1.6;}

/* CALENDAR */
.cal-hdr{padding:52px 20px 14px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-mtitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.cal-navbtn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.18s;}
.cal-navbtn:active{transform:scale(0.88);}
.cal-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.cal-chips::-webkit-scrollbar{display:none;}
.cal-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.cal-chip.active{color:white;border-color:transparent;}
.cal-grid{padding:0 20px;}
.cal-dhdr{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px;}
.cal-dl{font-size:11px;color:var(--muted);font-weight:500;padding:4px 0;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);background:var(--surface);color:var(--muted);}
.cal-cell.has-date{color:var(--text);}
.cal-cell.today{border:1.5px solid var(--accent);color:var(--accent);}
.cal-cell.completed{color:white;}
.cal-cell.completed.today{box-shadow:0 0 14px rgba(124,111,255,0.4);}
.cal-cell.empty{background:transparent;cursor:default;}
.cal-cell.future{opacity:0.28;cursor:default;}
.cal-cell:not(.empty):not(.future):active{transform:scale(0.82);}

/* STATS */
.stats-hdr{padding:52px 20px 18px;}
.stats-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;}
.stats-grid{padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border);animation:fadeUp 0.4s ease both;transition:transform 0.18s;}
.stat-card:active{transform:scale(0.95);}
.stat-icon{font-size:20px;margin-bottom:8px;}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}
.sec-title{font-size:11px;font-weight:600;padding:0 20px;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* CHART */
.chart-wrap{padding:0 20px;margin-bottom:20px;}
.chart-card{background:var(--surface);border-radius:var(--r);padding:18px;border:1px solid var(--border);}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.chart-ttl{font-size:14px;font-weight:600;margin-bottom:2px;}
.chart-sub{font-size:12px;color:var(--muted);}
.ctog{display:flex;gap:4px;}
.ctog-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.ctog-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:90px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.cbw{width:100%;display:flex;align-items:flex-end;flex:1;}
.cbar{width:100%;border-radius:5px 5px 0 0;min-height:3px;transition:height 0.7s cubic-bezier(0.4,0,0.2,1);}
.cbar.ab{background:linear-gradient(180deg,var(--accent),rgba(124,111,255,0.4));}
.cbar.cb{background:linear-gradient(180deg,var(--cyan),rgba(34,211,238,0.35));}
.cbar.hl{box-shadow:0 -3px 12px rgba(124,111,255,0.45);}
.cbar.chl{box-shadow:0 -3px 12px rgba(34,211,238,0.45);}
.cdlbl{font-size:9px;color:var(--muted);}
.cvlbl{font-size:9px;color:var(--muted2);margin-bottom:1px;}

/* TIME STATS */
.tstat-wrap{padding:0 20px;margin-bottom:20px;}
.tstat-card{background:var(--surface);border-radius:var(--r);padding:4px 16px;border:1px solid var(--border);}
.tstat-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.tstat-row:last-child{border-bottom:none;}
.tstat-left{font-size:13px;color:var(--muted2);display:flex;align-items:center;gap:7px;}
.tstat-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}

/* PROGRESS */
.prog-list{padding:0 20px;display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-name{font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;}
.prog-pct{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.prog-bar{height:7px;background:var(--s2);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;width:0;transition:width 0.9s cubic-bezier(0.4,0,0.2,1);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 22px calc(24px + var(--sb));width:100%;max-width:430px;border-top:1px solid var(--border2);animation:slideUp 0.32s cubic-bezier(0.4,0,0.2,1);}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:18px;}
.fg{margin-bottom:14px;}
.flbl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;display:block;}
.finput{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:var(--accent);}
.epicker{display:flex;gap:7px;flex-wrap:wrap;}
.eopt{width:42px;height:42px;border-radius:12px;background:var(--s2);border:2px solid transparent;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);}
.eopt.sel{border-color:var(--accent);background:rgba(124,111,255,0.14);transform:scale(1.1);}
.cpicker{display:flex;gap:10px;}
.copt{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),border-color 0.2s;}
.copt.sel{border-color:white;transform:scale(1.2);}
.save-btn{width:100%;background:linear-gradient(135deg,var(--accent),#5448d4);color:white;border:none;border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 18px rgba(124,111,255,0.35);}
.save-btn:active{transform:scale(0.97);opacity:0.88;}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--s2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);border:1px solid var(--border2);white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- HOME -->
<div id="pg-home" class="page active">
  <div class="header">
    <div><div class="h-title">Today</div><div class="h-sub" id="home-date"></div></div>
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
  <div class="today-banner">
    <div class="banner-top">
      <div><div class="banner-title" id="bnr-msg">Let's build today!</div><div class="banner-sub" id="bnr-sub">0 of 0 habits done</div></div>
      <div class="banner-pct" id="bnr-pct">0%</div>
    </div>
    <div class="banner-track"><div class="banner-fill" id="bnr-fill" style="width:0%"></div></div>
  </div>
  <div class="habits-list" id="habits-list">
    <div class="empty-state" id="empty-state">
      <div class="empty-emoji">🌱</div>
      <div class="empty-title">No habits yet</div>
      <div class="empty-text">Tap <strong>+</strong> to add your first habit and start your streak!</div>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div id="pg-calendar" class="page">
  <div class="cal-hdr">
    <div class="cal-nav">
      <div class="cal-mtitle" id="cal-mtitle"></div>
      <div style="display:flex;gap:8px;">
        <button class="cal-navbtn" onclick="changeMonth(-1)">‹</button>
        <button class="cal-navbtn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-chips" id="cal-chips"></div>
  </div>
  <div class="cal-grid">
    <div class="cal-dhdr">
      <div class="cal-dl">Su</div><div class="cal-dl">Mo</div><div class="cal-dl">Tu</div>
      <div class="cal-dl">We</div><div class="cal-dl">Th</div><div class="cal-dl">Fr</div><div class="cal-dl">Sa</div>
    </div>
    <div class="cal-cells" id="cal-cells"></div>
  </div>
</div>

<!-- STATS -->
<div id="pg-stats" class="page">
  <div class="stats-hdr"><div class="stats-title">Stats</div></div>
  <div class="stats-grid" id="stats-grid"></div>

  <div class="sec-title">Weekly Overview</div>
  <div class="chart-wrap">
    <div class="chart-card">
      <div class="chart-top">
        <div><div class="chart-ttl" id="main-chart-title">Habit Completions</div><div class="chart-sub" id="main-chart-sub"></div></div>
        <div class="ctog">
          <button class="ctog-btn active" onclick="switchChart('habit',this)">Habits</button>
          <button class="ctog-btn" onclick="switchChart('time',this)">Time</button>
        </div>
      </div>
      <div class="chart-bars" id="main-chart-bars"></div>
    </div>
  </div>

  <div class="sec-title">Daily Focus Time (14 days)</div>
  <div class="chart-wrap">
    <div class="chart-card">
      <div class="chart-top">
        <div><div class="chart-ttl">Focus Minutes</div><div class="chart-sub" id="time-chart-sub"></div></div>
      </div>
      <div class="chart-bars" id="time-chart-bars"></div>
    </div>
  </div>

  <div class="sec-title">Productive Time Per Habit</div>
  <div class="tstat-wrap"><div class="tstat-card" id="tstat-card"></div></div>

  <div class="sec-title">Monthly Completion Rate</div>
  <div class="prog-list" id="prog-list"></div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showPage('home',this)"><span class="nav-icon">🏠</span><span class="nav-label">Today</span></button>
  <button class="nav-item" onclick="showPage('calendar',this)"><span class="nav-icon">📅</span><span class="nav-label">Calendar</span></button>
  <button class="nav-item" onclick="showPage('stats',this)"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></button>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Habit</div>
    <div class="fg"><label class="flbl">Name</label><input class="finput" id="hname" type="text" placeholder="e.g. Read, Exercise, Meditate…" maxlength="40"></div>
    <div class="fg">
      <label class="flbl">Emoji</label>
      <div class="epicker">
        <div class="eopt sel" data-e="💧" onclick="pickE(this)">💧</div>
        <div class="eopt" data-e="📚" onclick="pickE(this)">📚</div>
        <div class="eopt" data-e="🏃" onclick="pickE(this)">🏃</div>
        <div class="eopt" data-e="🧘" onclick="pickE(this)">🧘</div>
        <div class="eopt" data-e="😴" onclick="pickE(this)">😴</div>
        <div class="eopt" data-e="🍎" onclick="pickE(this)">🍎</div>
        <div class="eopt" data-e="✍️" onclick="pickE(this)">✍️</div>
        <div class="eopt" data-e="🎸" onclick="pickE(this)">🎸</div>
        <div class="eopt" data-e="💊" onclick="pickE(this)">💊</div>
        <div class="eopt" data-e="🌿" onclick="pickE(this)">🌿</div>
      </div>
    </div>
    <div class="fg">
      <label class="flbl">Color</label>
      <div class="cpicker">
        <div class="copt sel" data-c="#7c6fff" style="background:#7c6fff" onclick="pickC(this)"></div>
        <div class="copt" data-c="#ff6f91" style="background:#ff6f91" onclick="pickC(this)"></div>
        <div class="copt" data-c="#4ade80" style="background:#4ade80" onclick="pickC(this)"></div>
        <div class="copt" data-c="#fbbf24" style="background:#fbbf24" onclick="pickC(this)"></div>
        <div class="copt" data-c="#38bdf8" style="background:#38bdf8" onclick="pickC(this)"></div>
        <div class="copt" data-c="#f97316" style="background:#f97316" onclick="pickC(this)"></div>
      </div>
    </div>
    <button class="save-btn" onclick="saveHabit()">Add Habit ✓</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────
var habits      = JSON.parse(localStorage.getItem('hf2_habits')      || '[]');
var completions = JSON.parse(localStorage.getItem('hf2_completions') || '{}');
var timeLogs    = JSON.parse(localStorage.getItem('hf2_timelogs')    || '{}');
var timers      = {};
var selE = '💧', selC = '#7c6fff';
var calDate = new Date(), selHid = null, chartMode = 'habit';

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DS     = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function save() {
  localStorage.setItem('hf2_habits',      JSON.stringify(habits));
  localStorage.setItem('hf2_completions', JSON.stringify(completions));
  localStorage.setItem('hf2_timelogs',    JSON.stringify(timeLogs));
}

function dkey(d) { return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n) { return String(n).padStart(2,'0'); }
function today() { return dkey(new Date()); }
function isDone(hid,dk) { return !!(completions[dk] && completions[dk].includes(hid)); }
function toggleDone(hid,dk) {
  if (!completions[dk]) completions[dk]=[];
  var i=completions[dk].indexOf(hid);
  i>=0 ? completions[dk].splice(i,1) : completions[dk].push(hid);
  save();
}

// ── STREAKS ────────────────────────────────────────────
function calcStreak(hid) {
  var streak=0, d=new Date();
  if (!isDone(hid,dkey(d))) d.setDate(d.getDate()-1);
  for (var i=0;i<366;i++) {
    if (isDone(hid,dkey(d))) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}
function calcMonthRate(hid) {
  var now=new Date(), y=now.getFullYear(), m=now.getMonth(), p=now.getDate(), done=0;
  for (var d=1;d<=p;d++) {
    var k=y+'-'+pad(m+1)+'-'+pad(d);
    if (isDone(hid,k)) done++;
  }
  return p>0 ? Math.round((done/p)*100) : 0;
}

// ── TIMER ──────────────────────────────────────────────
function fmt(s) {
  var h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if (h>0) return h+'h '+pad(m)+'m';
  return pad(m)+':'+pad(sec);
}
function fmts(s) {
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  if(h>0) return h+'h '+m+'m';
  if(m>0) return m+'m';
  return s>0 ? s+'s' : '—';
}
function startTimer(hid) {
  if (timers[hid] && timers[hid].on) return;
  if (!timers[hid]) timers[hid]={elapsed:0,on:false};
  timers[hid].on=true;
  timers[hid].t0=Date.now()-timers[hid].elapsed*1000;
  timers[hid].iv=setInterval(function(){
    timers[hid].elapsed=Math.floor((Date.now()-timers[hid].t0)/1000);
    refreshTimerUI(hid);
  },1000);
}
function stopTimer(hid) {
  if (!timers[hid]||!timers[hid].on) return;
  clearInterval(timers[hid].iv);
  timers[hid].on=false;
  var e=timers[hid].elapsed;
  if (e>0) {
    var k=today();
    if (!timeLogs[hid]) timeLogs[hid]={};
    if (!timeLogs[hid][k]) timeLogs[hid][k]=[];
    timeLogs[hid][k].push(e);
    save();
  }
  refreshTimerUI(hid);
}
function resetTimer(hid) {
  stopTimer(hid);
  if (timers[hid]) timers[hid].elapsed=0;
  refreshTimerUI(hid);
}
function refreshTimerUI(hid) {
  var disp=document.getElementById('td-'+hid);
  var btn=document.getElementById('tb-'+hid);
  var logs=document.getElementById('tl-'+hid);
  if (!disp) return;
  var e=timers[hid]?timers[hid].elapsed:0;
  var on=timers[hid]&&timers[hid].on;
  disp.textContent=fmt(e);
  disp.classList.toggle('running',on);
  if (btn) { btn.className='tbtn '+(on?'stop':'go'); btn.textContent=on?'⏸ Pause':'▶ Start'; }
  if (logs) {
    var k=today(), ls=(timeLogs[hid]&&timeLogs[hid][k])?timeLogs[hid][k]:[];
    var tot=ls.reduce(function(a,b){return a+b;},0);
    logs.innerHTML=ls.length>0
      ? '<span class="tlog">Today: '+fmts(tot)+'</span>'+ls.map(function(s){return '<span class="tlog">'+fmts(s)+'</span>';}).join('')
      : '<span class="tlog" style="color:var(--muted)">No sessions yet</span>';
  }
}
function getTodayTime(hid){var k=today();if(!timeLogs[hid]||!timeLogs[hid][k])return 0;return timeLogs[hid][k].reduce(function(a,b){return a+b;},0);}
function getDateTime(hid,dk){if(!timeLogs[hid]||!timeLogs[hid][dk])return 0;return timeLogs[hid][dk].reduce(function(a,b){return a+b;},0);}
function getTotalTime(hid){if(!timeLogs[hid])return 0;return Object.values(timeLogs[hid]).flat().reduce(function(a,b){return a+b;},0);}
function getAvgTime(hid){if(!timeLogs[hid])return 0;var days=Object.keys(timeLogs[hid]).filter(function(k){return timeLogs[hid][k].length>0;});if(!days.length)return 0;var tot=days.reduce(function(s,k){return s+timeLogs[hid][k].reduce(function(a,b){return a+b;},0);},0);return Math.round(tot/days.length);}

// ── HOME ───────────────────────────────────────────────
function renderHome() {
  var now=new Date();
  document.getElementById('home-date').textContent=DAYS[now.getDay()]+', '+MONTHS[now.getMonth()]+' '+now.getDate();
  var tk=today(), list=document.getElementById('habits-list');
  Array.from(list.querySelectorAll('.habit-card')).forEach(function(e){e.remove();});
  document.getElementById('empty-state').style.display=habits.length?'none':'block';

  habits.forEach(function(h,idx) {
    var done=isDone(h.id,tk), streak=calcStreak(h.id);
    var dots=Array.from({length:7},function(_,i){
      var d=new Date(); d.setDate(d.getDate()-(6-i));
      var k=dkey(d), wasD=isDone(h.id,k), isT=(i===6);
      return '<div class="wd'+(wasD?' done':'')+(isT?' today':'')+'"'+(wasD?' style="--c:'+h.color+'"':'')+' ></div>';
    }).join('');
    var on=timers[h.id]&&timers[h.id].on, e=timers[h.id]?timers[h.id].elapsed:0;
    var card=document.createElement('div');
    card.className='habit-card';
    card.style.animationDelay=(idx*0.07)+'s';
    card.innerHTML=
      '<div class="hc-stripe" style="background:'+h.color+'"></div>'+
      '<div class="hc-body">'+
        '<div class="hc-top">'+
          '<div class="hc-left">'+
            '<span class="hc-emoji">'+h.emoji+'</span>'+
            '<div>'+
              '<div class="hc-name">'+h.name+'</div>'+
              (streak>0?'<span class="streak-badge">🔥 '+streak+' day'+(streak!==1?'s':'')+'</span>':'<span style="font-size:11px;color:var(--muted)">Start your streak!</span>')+
            '</div>'+
          '</div>'+
          '<div class="hc-actions">'+
            '<button class="del-btn" onclick="deleteHabit(\''+h.id+'\')">🗑</button>'+
            '<button class="check-btn'+(done?' done':'')+'" style="--c:'+h.color+'" onclick="toggleToday(\''+h.id+'\')">'+
              '<span class="ck-icon">'+(done?'✓':'')+'</span>'+
            '</button>'+
          '</div>'+
        '</div>'+
        '<div class="week-dots">'+dots+'</div>'+
      '</div>'+
      '<div class="timer-sec">'+
        '<div class="timer-top">'+
          '<span class="timer-label">⏱ Focus Timer</span>'+
          '<span class="timer-display'+(on?' running':'')+'" id="td-'+h.id+'">'+fmt(e)+'</span>'+
        '</div>'+
        '<div class="timer-btns">'+
          '<button class="tbtn '+(on?'stop':'go')+'" id="tb-'+h.id+'" onclick="handleTimer(\''+h.id+'\')">'+(on?'⏸ Pause':'▶ Start')+'</button>'+
          '<button class="tbtn rst" onclick="resetTimer(\''+h.id+'\');renderHome()">↺ Reset</button>'+
        '</div>'+
        '<div class="timer-logs" id="tl-'+h.id+'"></div>'+
      '</div>';
    list.appendChild(card);
    refreshTimerUI(h.id);
  });

  var total=habits.length, doneC=habits.filter(function(h){return isDone(h.id,tk);}).length;
  var pct=total>0?Math.round((doneC/total)*100):0;
  document.getElementById('bnr-pct').textContent=pct+'%';
  document.getElementById('bnr-fill').style.width=pct+'%';
  document.getElementById('bnr-sub').textContent=doneC+' of '+total+' habit'+(total!==1?'s':'')+' done';
  document.getElementById('bnr-msg').textContent=pct===100&&total>0?'All done! 🎉':pct>=50?'Keep going! 💪':'Let\'s build today!';
}

function handleTimer(hid) {
  var on=timers[hid]&&timers[hid].on;
  if (on) { stopTimer(hid); toast('⏸ Session saved!'); renderStats(); }
  else { startTimer(hid); toast('⏱ Timer started!'); }
}
function toggleToday(hid) {
  toggleDone(hid,today()); renderHome();
  toast(isDone(hid,today())?'✓ Done! Great job!':'Unmarked');
}
function deleteHabit(hid) {
  if (!confirm('Delete this habit?')) return;
  stopTimer(hid); habits=habits.filter(function(h){return h.id!==hid;}); delete timers[hid];
  save(); renderHome(); renderCalendar(); renderStats();
}

// ── MODAL ──────────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.add('open');setTimeout(function(){document.getElementById('hname').focus();},320);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeBg(e){if(e.target===document.getElementById('modal'))closeModal();}
function pickE(el){document.querySelectorAll('.eopt').forEach(function(e){e.classList.remove('sel');});el.classList.add('sel');selE=el.dataset.e;}
function pickC(el){document.querySelectorAll('.copt').forEach(function(e){e.classList.remove('sel');});el.classList.add('sel');selC=el.dataset.c;}
function saveHabit(){
  var name=document.getElementById('hname').value.trim();
  if(!name){toast('Please enter a name');return;}
  habits.push({id:Date.now().toString(),name:name,emoji:selE,color:selC,created:today()});
  save(); document.getElementById('hname').value='';
  closeModal(); renderHome(); renderCalendar(); renderStats(); toast('Habit added! 🎉');
}

// ── CALENDAR ───────────────────────────────────────────
function renderCalendar(){
  var y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('cal-mtitle').textContent=MONTHS[m]+' '+y;
  var chips=document.getElementById('cal-chips'); chips.innerHTML='';
  if(!habits.length){chips.innerHTML='<span style="font-size:13px;color:var(--muted)">Add habits first</span>';document.getElementById('cal-cells').innerHTML='';return;}
  if(!selHid||!habits.find(function(h){return h.id===selHid;})) selHid=habits[0].id;
  habits.forEach(function(h){
    var chip=document.createElement('div');
    chip.className='cal-chip'+(h.id===selHid?' active':'');
    if(h.id===selHid) chip.style.background=h.color;
    chip.textContent=h.emoji+' '+h.name;
    chip.onclick=function(){selHid=h.id;renderCalendar();};
    chips.appendChild(chip);
  });
  var cells=document.getElementById('cal-cells'); cells.innerHTML='';
  var first=new Date(y,m,1).getDay(), dim=new Date(y,m+1,0).getDate(), tk=today(), now=new Date();
  var sh=habits.find(function(h){return h.id===selHid;});
  for(var i=0;i<first;i++){var c=document.createElement('div');c.className='cal-cell empty';cells.appendChild(c);}
  for(var d=1;d<=dim;d++){
    var k=y+'-'+pad(m+1)+'-'+pad(d);
    var cellD=new Date(y,m,d), isT=(k===tk), isFut=(cellD>now), done=isDone(selHid,k);
    var c=document.createElement('div');
    c.className='cal-cell has-date'+(isT?' today':'')+(done?' completed':'')+(isFut?' future':'');
    if(done&&sh) c.style.background=sh.color;
    c.textContent=d;
    if(!isFut){(function(kk){c.onclick=function(){toggleDone(selHid,kk);renderCalendar();renderHome();renderStats();};})(k);}
    cells.appendChild(c);
  }
}
function changeMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCalendar();}

// ── STATS ──────────────────────────────────────────────
function switchChart(mode,btn){
  chartMode=mode;
  document.querySelectorAll('.ctog-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderMainChart();
}

function renderStats(){
  var bestS=habits.length?Math.max.apply(null,habits.map(calcStreak)):0;
  var todayD=habits.filter(function(h){return isDone(h.id,today());}).length;
  var allTime=0; Object.values(completions).forEach(function(a){allTime+=a.length;});
  var totTime=habits.reduce(function(s,h){return s+getTotalTime(h.id);},0);
  var grid=document.getElementById('stats-grid');
  var cards=[
    {icon:'🏆',val:bestS,lbl:'Best Streak',col:'var(--amber)'},
    {icon:'✅',val:todayD,lbl:'Done Today',col:'var(--green)'},
    {icon:'⚡',val:allTime,lbl:'All-time Checks',col:'var(--accent)'},
    {icon:'⏱',val:fmts(totTime),lbl:'Total Focus Time',col:'var(--cyan)'},
  ];
  grid.innerHTML=cards.map(function(c,i){
    return '<div class="stat-card" style="animation-delay:'+(i*0.08)+'s"><div class="stat-icon">'+c.icon+'</div><div class="stat-val" style="color:'+c.col+'">'+c.val+'</div><div class="stat-lbl">'+c.lbl+'</div></div>';
  }).join('');

  renderMainChart(); renderTimeChart(); renderTStats(); renderProgress();
}

function renderMainChart(){
  var bars=document.getElementById('main-chart-bars'); bars.innerHTML='';
  var now=new Date();
  document.getElementById('main-chart-sub').textContent=MONTHS[now.getMonth()]+' '+now.getFullYear();
  document.getElementById('main-chart-title').textContent=chartMode==='habit'?'Habit Completions':'Focus Time (min)';
  var days=Array.from({length:7},function(_,i){var d=new Date();d.setDate(d.getDate()-(6-i));return d;});
  var vals=days.map(function(d){
    if(chartMode==='habit') return habits.filter(function(h){return isDone(h.id,dkey(d));}).length;
    return Math.round(habits.reduce(function(s,h){return s+getDateTime(h.id,dkey(d));},0)/60);
  });
  var mx=Math.max.apply(null,vals.concat(1));
  days.forEach(function(d,i){
    var val=vals[i], pct=Math.round((val/mx)*100), isT=(dkey(d)===today());
    var col=document.createElement('div'); col.className='chart-col';
    col.innerHTML='<div class="cvlbl">'+(val>0?val:'')+'</div><div class="cbw"><div class="cbar '+(chartMode==='habit'?'ab':'cb')+(isT?' '+(chartMode==='habit'?'hl':'chl'):'')+ '" style="height:'+Math.max(pct,3)+'%"></div></div><div class="cdlbl">'+DS[d.getDay()]+'</div>';
    bars.appendChild(col);
  });
}

function renderTimeChart(){
  var bars=document.getElementById('time-chart-bars'); bars.innerHTML='';
  var now=new Date();
  document.getElementById('time-chart-sub').textContent='Last 14 days · minutes';
  var days=Array.from({length:14},function(_,i){var d=new Date();d.setDate(d.getDate()-(13-i));return d;});
  var vals=days.map(function(d){return Math.round(habits.reduce(function(s,h){return s+getDateTime(h.id,dkey(d));},0)/60);});
  var mx=Math.max.apply(null,vals.concat(1));
  days.forEach(function(d,i){
    var val=vals[i], pct=Math.round((val/mx)*100), isT=(dkey(d)===today());
    var col=document.createElement('div'); col.className='chart-col';
    col.innerHTML='<div class="cbw"><div class="cbar cb'+(isT?' chl':'')+ '" style="height:'+Math.max(pct,2)+'%"></div></div><div class="cdlbl">'+d.getDate()+'</div>';
    bars.appendChild(col);
  });
}

function renderTStats(){
  var card=document.getElementById('tstat-card');
  if(!habits.length){card.innerHTML='<div style="color:var(--muted);font-size:13px;padding:12px 0">Add habits to track time</div>';return;}
  card.innerHTML=habits.map(function(h){
    var td=getTodayTime(h.id), tot=getTotalTime(h.id), avg=getAvgTime(h.id);
    return '<div class="tstat-row"><div class="tstat-left">'+h.emoji+' <strong>'+h.name+'</strong></div><div></div></div>'+
      '<div class="tstat-row"><div class="tstat-left" style="padding-left:26px">Today</div><div class="tstat-val" style="color:var(--cyan)">'+fmts(td)+'</div></div>'+
      '<div class="tstat-row"><div class="tstat-left" style="padding-left:26px">Avg / day</div><div class="tstat-val" style="color:var(--accent)">'+fmts(avg)+'</div></div>'+
      '<div class="tstat-row"><div class="tstat-left" style="padding-left:26px">All-time</div><div class="tstat-val" style="color:var(--amber)">'+fmts(tot)+'</div></div>';
  }).join('');
}

function renderProgress(){
  var list=document.getElementById('prog-list'); list.innerHTML='';
  if(!habits.length){list.innerHTML='<div style="color:var(--muted);font-size:13px">Add habits to see progress</div>';return;}
  habits.forEach(function(h,i){
    var rate=calcMonthRate(h.id), streak=calcStreak(h.id);
    var item=document.createElement('div'); item.className='prog-item';
    item.innerHTML=
      '<div class="prog-top">'+
        '<div class="prog-name">'+h.emoji+' '+h.name+(streak>0?' <span style="font-size:11px;color:var(--amber)">🔥'+streak+'</span>':'')+'</div>'+
        '<div class="prog-pct" style="color:'+h.color+'">'+rate+'%</div>'+
      '</div>'+
      '<div class="prog-bar"><div class="prog-fill" style="background:'+h.color+'" data-t="'+rate+'"></div></div>';
    list.appendChild(item);
    setTimeout(function(){var f=item.querySelector('.prog-fill');if(f)f.style.width=f.dataset.t+'%';},80+i*60);
  });
}

// ── UTILS ──────────────────────────────────────────────
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
  document.getElementById('pg-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='calendar') renderCalendar();
  if(id==='stats') renderStats();
  if(id==='home') renderHome();
}
var toastT;
function toast(msg){
  clearTimeout(toastT);
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  toastT=setTimeout(function(){t.classList.remove('show');},2400);
}

// ── PWA: inline manifest via JS ─────────────────────────
(function(){
  try {
    var mf={name:'HabitFlow',short_name:'HabitFlow',display:'standalone',orientation:'portrait',background_color:'#0f0f14',theme_color:'#0f0f14',start_url:window.location.href,scope:window.location.href.split('?')[0].split('#')[0]};
    var blob=new Blob([JSON.stringify(mf)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var link=document.createElement('link'); link.rel='manifest'; link.href=url;
    document.head.appendChild(link);
  } catch(e){}
  // SW
  if('serviceWorker' in navigator){
    var swCode="const C='hf-v2';const A=['./'];self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});";
    var swBlob=new Blob([swCode],{type:'application/javascript'});
    var swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:'./'}).catch(function(){});
  }
})();

// ── INIT ───────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
